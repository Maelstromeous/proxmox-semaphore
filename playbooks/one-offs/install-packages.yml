---
- name: Install common packages on all hosts
  hosts: all
  become: true
  gather_facts: false # handled by bootstrap-and-check.yml to ignore dead hosts

  vars:
    # Define your package list here
    common_packages:
      - htop
      - net-tools

  pre_tasks:
    - name: Bootstrap & validate host reachability
      import_tasks: ../common/bootstrap-and-check.yml

  tasks:
    - name: Ensure apt cache is updated
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [packages, apt]

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
      tags: [packages, install]