- name: "PRETASK: Bootstrap python3 (required for fact gathering)"
  raw: apt-get install -y python3 python3-apt
  changed_when: false

- name: "PRETASK: Gather facts (now that python3 is present)"
  setup:
  ignore_errors: true

- name: "PRETASK: Skip host if facts unavailable (host offline)"
  meta: end_host
  when: ansible_distribution is undefined