---
- name: Upgrade Debian/Ubuntu hosts to latest packages
  hosts: all
  ignore_unreachable: true
  become: true
  gather_facts: false # handled by bootstrap-and-check.yml to ignore dead hosts

  vars:
    upgrade_type: "dist"
    cache_valid_time: 3600
    reboot_if_required: true
    reboot_timeout: 900

  pre_tasks:
    - name: Bootstrap & validate host reachability
      import_tasks: ../common/bootstrap-and-check.yml

  tasks:
    - name: Refresh apt cache (if stale)
    # Ansible's apt module handles non-interactive use by default
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: "{{ cache_valid_time }}"
      tags: [apt, upgrade, maintenance]

    - name: Upgrade all packages to latest ({{ upgrade_type }})
      ansible.builtin.apt:
        upgrade: "{{ upgrade_type }}"   # "safe" or "dist"
      register: apt_upgrade_result
      tags: [apt, upgrade, maintenance]

    - name: Autoremove orphaned packages
      ansible.builtin.apt:
        autoremove: true
      tags: [apt, cleanup, maintenance]

    - name: Autoclean apt cache
      ansible.builtin.apt:
        autoclean: true
      tags: [apt, cleanup, maintenance]

    - name: Clean apt cache (optional but tidy)
      ansible.builtin.apt:
        clean: true
      tags: [apt, cleanup, maintenance]

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      changed_when: false
      tags: [apt, reboot, maintenance]

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
      when:
        - reboot_if_required
        - reboot_required_file.stat.exists
      tags: [apt, reboot, maintenance]
