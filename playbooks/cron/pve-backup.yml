---
- name: Back up PVE root filesystem to network share
  hosts: pve_nodes
  ignore_unreachable: true
  become: true
  gather_facts: true # required for ansible_date_time in backup naming and metadata
  vars:
    vg_name: pve
    root_lv: root
    snap_name: pve-root-snap
    snap_size: 15G
    snap_device: "/dev/{{ vg_name }}/{{ snap_name }}"
    snap_mount: /mnt/pve-root-snap
    backup_base: /mnt/pve/unas-pro-Proxmox/pve-backups
    backup_host_base: "{{ backup_base }}/{{ inventory_hostname }}"
    backup_dest: "{{ backup_host_base }}/{{ ansible_date_time.iso8601_basic_short }}"
    snapshot_retention: 7
    min_free_gib: 12
  pre_tasks:
    - name: Bootstrap & validate host reachability
      import_tasks: ../common/bootstrap-and-check.yml
    - name: Check available VG free space
      ansible.builtin.command: vgs {{ vg_name }} --noheadings --units g -o vg_free
      register: vg_free_output
      changed_when: false
      tags: [backup, preflight]
    - name: Parse VG free space into a fact
      ansible.builtin.set_fact:
        vg_free_gib: "{{ vg_free_output.stdout | trim | regex_replace('[^0-9.]', '') | float }}"
      tags: [backup, preflight]
    - name: Abort if VG free space is below threshold
      ansible.builtin.fail:
        msg: >
          VG '{{ vg_name }}' has {{ vg_free_gib | round(1) }} GiB free —
          {{ min_free_gib }} GiB required. Aborting before snapshot.
      when: vg_free_gib | float < min_free_gib
      tags: [backup, preflight]
  tasks:
    - name: Ensure snapshot mount point exists
      ansible.builtin.file:
        path: "{{ snap_mount }}"
        state: directory
        mode: '0700'
      tags: [backup, setup]
    - name: Ensure per-host backup directory exists on share
      ansible.builtin.file:
        path: "{{ backup_host_base }}"
        state: directory
        mode: '0750'
      tags: [backup, setup]
    - name: Find existing backups for link-dest reference
      ansible.builtin.find:
        paths: "{{ backup_host_base }}"
        file_type: directory
        recurse: false
      register: existing_backups
      tags: [backup, rotate]
    - name: Set link-dest to most recent existing backup
      ansible.builtin.set_fact:
        link_dest: "{{ (existing_backups.files | sort(attribute='mtime') | last).path }}"
      when: existing_backups.files | length > 0
      tags: [backup, rotate]
    - name: Create LVM snapshot of root LV
      ansible.builtin.command: >
        lvcreate -L{{ snap_size }} -s -n {{ snap_name }} /dev/{{ vg_name }}/{{ root_lv }}
      register: snap_create
      changed_when: snap_create.rc == 0
      tags: [backup, snapshot]
    - name: Mount snapshot read-only
      ansible.posix.mount:
        path: "{{ snap_mount }}"
        src: "{{ snap_device }}"
        fstype: ext4
        opts: ro,noatime
        state: ephemeral
      tags: [backup, snapshot]
    - name: Sync snapshot to network share (first run — no link-dest)
      ansible.builtin.command: >
        rsync -aAX
        --stats
        --exclude=/proc/*
        --exclude=/sys/*
        --exclude=/dev/*
        --exclude=/run/*
        --exclude=/mnt/*
        --exclude=/tmp/*
        --exclude=/var/tmp/*
        --exclude=/var/cache/*
        --exclude=/var/log/journal/*
        --exclude=/var/lib/vz/dump/*
        --exclude=/var/lib/vz/template/iso/*
        --exclude=/var/lib/vz/template/cache/*
        --exclude=/var/lib/vz/images/*
        --delete
        {{ snap_mount }}/
        {{ backup_dest }}/
      when: existing_backups.files | length == 0
      register: rsync_result_first
      changed_when: rsync_result_first.rc == 0
      tags: [backup, sync]
    - name: Print rsync stats (first run)
      ansible.builtin.debug:
        msg: "{{ rsync_result_first.stdout_lines }}"
      when: rsync_result_first is not skipped
      tags: [backup, sync]
    - name: Sync snapshot to network share (incremental — with link-dest)
      ansible.builtin.command: >
        rsync -aAX
        --stats
        --exclude=/proc/*
        --exclude=/sys/*
        --exclude=/dev/*
        --exclude=/run/*
        --exclude=/mnt/*
        --exclude=/tmp/*
        --exclude=/var/tmp/*
        --exclude=/var/cache/*
        --exclude=/var/log/journal/*
        --exclude=/var/lib/vz/dump/*
        --exclude=/var/lib/vz/template/iso/*
        --exclude=/var/lib/vz/template/cache/*
        --exclude=/var/lib/vz/images/*
        --delete
        --link-dest={{ link_dest }}
        {{ snap_mount }}/
        {{ backup_dest }}/
      when: existing_backups.files | length > 0
      register: rsync_result_incremental
      changed_when: rsync_result_incremental.rc == 0
      tags: [backup, sync]
    - name: Print rsync stats (incremental)
      ansible.builtin.debug:
        msg: "{{ rsync_result_incremental.stdout_lines }}"
      when: rsync_result_incremental is not skipped
      tags: [backup, sync]
    - name: Write backup metadata file
      ansible.builtin.copy:
        dest: "{{ backup_dest }}/.backup-meta"
        content: |
          host: {{ inventory_hostname }}
          completed: {{ ansible_date_time.iso8601 }}
          source: /dev/{{ vg_name }}/{{ root_lv }}
          snapshot_size: {{ snap_size }}
          link_dest: {{ link_dest | default('none') }}
        mode: '0644'
      tags: [backup, sync]
    - name: Unmount snapshot
      ansible.posix.mount:
        path: "{{ snap_mount }}"
        state: unmounted
      tags: [backup, cleanup]
    - name: Remove LVM snapshot
      ansible.builtin.lvol:
        vg: "{{ vg_name }}"
        lv: "{{ snap_name }}"
        state: absent
        force: true
      tags: [backup, cleanup]
    - name: Find all backup snapshots for rotation
      ansible.builtin.find:
        paths: "{{ backup_host_base }}"
        file_type: directory
        recurse: false
      register: all_backups
      tags: [backup, rotate]
    - name: Remove oldest backups beyond retention limit
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ (all_backups.files | sort(attribute='mtime'))[: -(snapshot_retention)] }}"
      when: all_backups.files | length > snapshot_retention
      tags: [backup, rotate]